name: RestoManager CI/CD Pipeline

# Запускать при push в любую ветку
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Тестирование
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # Шаг 1: Загрузить код
      - name: Checkout code
        uses: actions/checkout@v3
      
      # Шаг 2: Установить Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      # Шаг 3: Установить зависимости
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      # Шаг 4: Запустить тесты
      - name: Run tests
        run: |
          python -m unittest test_resto_manager.py -v
  
  # Job 2: Проверка синтаксиса и стиля
  lint:
    name: Check Code Style
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install linter
        run: pip install pylint
      
      - name: Run linter
        run: |
          pylint resto_manager.py --exit-zero
          echo "Linting completed (warnings are informational only)"
  
  # Job 3: Сборка и проверка запуска
  build:
    name: Build and Verify
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Verify application runs
        run: |
          python resto_manager.py
      
      - name: Create build artifact
        run: |
          mkdir build
          cp *.py build/
          echo "Build completed at $(date)" > build/build_info.txt
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: resto-manager-build
          path: build/